<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BuyNest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .forget-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }
        .image-section {
            flex: 1;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('background.png') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .image-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .image-section p {
            font-size: 1.2rem;
            max-width: 400px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: white;
        }
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            color: #ff0000;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 0 3px rgba(255,0,0,0.1);
        }
        .reset-btn {
            width: 100%;
            padding: 1rem;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .reset-btn:hover {
            background-color: #cc0000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .reset-btn:active {
            transform: translateY(0);
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        .back-link a {
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff0000;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        .success-message {
            color: #28a745;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        @media (max-width: 768px) {
            .forget-container {
                flex-direction: column;
            }
            .image-section {
                flex: 0 0 200px;
                padding: 1.5rem;
            }
            .image-section h2 {
                font-size: 1.8rem;
            }
            .image-section p {
                font-size: 1rem;
            }
            .form-section {
                flex: 1;
                padding: 1.5rem;
            }
        }
        @media (max-width: 480px) {
            .form-section {
                padding: 1rem;
            }
            .logo h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="forget-container">
        <div class="image-section">
            <h2>Forgot Password?</h2>
            <p>No worries! Enter your email address and we'll send you a reset link.</p>
        </div>
        <div class="form-section">
            <div class="form-container">
                <div class="logo">
                    <h1>BuyNest</h1>
                </div>
                <form id="forgetForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                    <button type="submit" class="reset-btn">Send Reset Link</button>
                    <p class="error-message" id="errorMessage"></p>
                    <p class="success-message" id="successMessage">Reset link sent! Check your email.</p>
                </form>
                <div class="back-link">
                    Remember your password? <a href="signin.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            if (!email) {
                errorMessage.textContent = 'Please enter your email address';
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                return;
            }

            // In a real app, you would send a request to server to send reset email
            // For demo, we'll just show success message
            errorMessage.style.display = 'none';
            successMessage.style.display = 'block';

            // Simulate sending and then redirect to signin after a delay
            setTimeout(() => {
                alert('Password reset link would be sent to: ' + email + '\n(Simulated for demo)');
                window.location.href = 'signin.html';
            }, 2000);
        });
    </script>
</body>
</html>
